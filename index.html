<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Nosso Aplicativo 💗</title>

    <!-- Configurações do iOS para rodar em TELA CHEIA total -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Ícone de coração (Icone.jpg) para a Tela de Início -->
    <link rel="apple-touch-icon" href="Icone.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="Icone.jpg">
    <link rel="shortcut icon" type="image/jpeg" href="Icone.jpg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            min-height: -webkit-fill-available;
            overflow: hidden;
            /* A imagem de fundo agora é aplicada AQUI para expandir 100% na tela do iPhone */
            background-image: url('fundo.jpg'); /* Se seu fundo for PNG, mude para fundo.png */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Parâmetros para desativar a barra de rodapé e o modo escuro padrão -->
    <iframe src="https://com-amor-para-larissa.streamlit.app/?embed=true&embed_options=disable_padding" allowtransparency="true"></iframe>

</body>
</html>
