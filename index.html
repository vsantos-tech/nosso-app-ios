<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover é o segredo para o iPhone preencher até o topo da tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Nosso Aplicativo 💗</title>

    <!-- Faz o iOS rodar em Tela Cheia como um App Nativo -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Ícone apontando para Icone.jpg (Com I maiúsculo) -->
    <link rel="apple-touch-icon" href="Icone.jpg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFD1DC;
        }

        /* Redimensiona o iframe para cobrir a tela do celular por completo */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://com-amor-para-larissa.streamlit.app/?embed=true"></iframe>

</body>
</html>
