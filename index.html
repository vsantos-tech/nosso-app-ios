<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Nosso Aplicativo 💗</title>

    <!-- Configurações para iOS abrir em Tela Cheia -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Ícone de Coração para a Tela de Início -->
    <link rel="apple-touch-icon" href="Icone.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="Icone.jpg">
    <link rel="shortcut icon" type="image/jpeg" href="Icone.jpg">

    <style>
        * {
            margin: 0 !important;
            padding: 0 !important;
            box-sizing: border-box !important;
        }

        html, body {
            width: 100vw !important;
            height: 100vh !important;
            overflow: hidden !important;
            background-color: #FFD1DC !important; /* Fundo rosa fixo */
        }

        /* O iframe é ajustado para empurrar o rodapé do Streamlit para fora da tela */
        iframe {
            width: 100vw !important;
            height: calc(100vh + 50px) !important; /* Estica além do rodapé para escondê-lo */
            border: none !important;
            display: block !important;
            margin-top: 0 !important;
            margin-bottom: -50px !important;
        }
    </style>
</head>
<body>

    <iframe src="https://com-amor-para-larissa.streamlit.app/?embed=true"></iframe>

</body>
</html>
