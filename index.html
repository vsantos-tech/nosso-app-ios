<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Nosso Aplicativo 💗</title>

    <!-- Configurações do iOS para TELA CHEIA total -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Ícones para o Safari e iOS (cobrindo .jpg e favicon) -->
    <link rel="apple-touch-icon" href="Icone.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="Icone.jpg">
    <link rel="icon" type="image/jpeg" href="Icone.jpg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: -webkit-fill-available; /* Ajuste preciso para a tela inteira do iPhone */
            overflow: hidden;
            background-color: transparent;
        }

        /* Faz o iframe ocupar 100% da tela real sem deixar sobra */
        iframe {
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://com-amor-para-larissa.streamlit.app/?embed=true"></iframe>

</body>
</html>
