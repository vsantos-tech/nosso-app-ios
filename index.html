<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover expande o fundo ate as bordas e barra do iPhone -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Nosso Aplicativo 💗</title>

    <!-- Configurações do iOS para rodar em TELA CHEIA total -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Ícone apontando exatamente para o arquivo Icone.jpg (Com I maiúsculo) -->
    <link rel="apple-touch-icon" href="Icone.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="Icone.jpg">
    <link rel="icon" type="image/jpeg" href="Icone.jpg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            background-color: transparent;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Link embed apontando para o app real -->
    <iframe src="https://com-amor-para-larissa.streamlit.app/?embed=true"></iframe>

</body>
</html>
